name: firestack
description: Flutter SDK for Firestack - a Firebase-compatible backend. Provides authentication, Firestore-like database, file storage, instant messaging, notifications, remote config, analytics, and realtime listeners with auto-reconnect.
version: 1.1.0
homepage: https://github.com/firestack/firestack-flutter

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  http: ^1.2.0
  http_parser: ^4.0.0
  web_socket_channel: ^3.0.0
  crypto: ^3.0.3
  mime: ^2.0.0
  path: ^1.9.0

dev_dependencies:
  test: ^1.25.0
  lints: ^4.0.0
